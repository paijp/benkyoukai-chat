<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>勉強会 質問サポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f7f6f1;
      color: #2c2c2a;
      font-size: 14px;
      line-height: 1.6;
    }
    .frame {
      max-width: 480px;
      margin: 0 auto;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .invalid { padding: 40px 24px; text-align: center; color: #5f5e5a; line-height: 1.8; }
    .loading { padding: 40px 24px; text-align: center; color: #5f5e5a; }
    .header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid rgba(0,0,0,0.15); min-height: 52px; }
    .header h3 { font-size: 15px; font-weight: 500; flex: 1; }
    .header .count { font-size: 12px; color: #888780; }
    .tabs { display: flex; border-bottom: 0.5px solid rgba(0,0,0,0.15); }
    .tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; color: #5f5e5a; cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; font-family: inherit; }
    .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 600; }
    .list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .card { margin: 6px 12px; padding: 12px 14px; border-radius: 10px; background: #fafaf8; border: 1px solid #eeecea; cursor: pointer; }
    .card.mine { background: #f0eeff; border-color: #d8d4f5; }
    .card.has-host-reply { background: #f0fff4; border-color: #d0eeda; }
    .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; flex: 1; }
    .card-time { font-size: 11px; color: #888780; }
    .card-body { font-size: 13px; color: #3c3c3a; margin-bottom: 8px; line-height: 1.5; }
    .card-foot { display: flex; align-items: center; gap: 8px; }
    .status { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .status.answered { background: #e8f5e9; color: #388e3c; }
    .status.waiting { background: #fff3e0; color: #f57c00; }
    .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .tag.host { background: #f3f0ff; color: #534AB7; }
    .tag.ann { background: #fff3e0; color: #f57c00; }
    .reply-count { font-size: 12px; color: #888780; margin-left: auto; }
    .empty { padding: 40px 24px; text-align: center; color: #888780; line-height: 1.8; }
    .fab { position: absolute; bottom: 20px; right: 16px; background: #534AB7; color: #fff; border: none; border-radius: 24px; padding: 12px 22px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 12px rgba(83,74,183,0.35); font-family: inherit; }
    .thread-head { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.15); min-height: 52px; gap: 10px; }
    .back-btn { background: none; border: none; font-size: 22px; color: #534AB7; cursor: pointer; padding: 0 4px; font-family: inherit; }
    .thread-title { font-size: 15px; font-weight: 500; }
    .thread-body { flex: 1; overflow-y: auto; padding: 12px; }
    .reply-box { background: #fafaf8; border: 1px solid #eeecea; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .reply-box.first { border-left: 3px solid #534AB7; }
    .reply-box.host-reply { background: #f3f0ff; border-color: #d8d4f5; border-left: 3px solid #534AB7; }
    .reply-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .reply-user { font-size: 13px; font-weight: 500; flex: 1; }
    .reply-time { font-size: 11px; color: #888780; }
    .reply-text { font-size: 13px; color: #2c2c2a; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .reply-text a { color: #534AB7; }
    .composer { display: flex; gap: 8px; padding: 10px 12px; border-top: 0.5px solid rgba(0,0,0,0.15); background: #fff; }
    .composer input { flex: 1; border: 1px solid #d5d4d0; border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; font-family: inherit; }
    .composer input:focus { border-color: #534AB7; }
    .send-btn { background: #534AB7; color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 16px; cursor: pointer; flex-shrink: 0; }
    .compose-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .compose-body p { color: #5f5e5a; font-size: 13px; }
    .compose-body textarea { width: 100%; min-height: 140px; border: 1px solid #d5d4d0; border-radius: 10px; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; outline: none; }
    .compose-body textarea:focus { border-color: #534AB7; }
    .compose-body button#post-btn { background: #534AB7; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .kind-tabs { display: flex; gap: 8px; }
    .kind-tab { flex: 1; padding: 8px; border: 1px solid #d5d4d0; border-radius: 8px; background: #fafaf8; color: #5f5e5a; cursor: pointer; font-size: 13px; font-family: inherit; }
    .kind-tab.active { background: #534AB7; color: #fff; border-color: #534AB7; }
    .notify-label { font-size: 13px; color: #5f5e5a; display: flex; align-items: center; gap: 6px; }
    .mode-bar { padding: 8px 14px; display: flex; align-items: center; gap: 12px; background: #f3f0ff; border-bottom: 0.5px solid #d8d4f5; font-size: 13px; }
    .mode-bar label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .invite-btn { margin-left: auto; background: #534AB7; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<div class="frame" id="app">
  <div class="loading">読み込み中…</div>
</div>
<script>
  const API_BASE = "%%SUPABASE_FUNCTION_URL%%";
  const TOKEN = new URLSearchParams(location.search).get("t") || "";
  let state = { loading: true, participant: null, posts: [], screen: "list", tab: "all", curItem: null, isHost: false, composeKind: "ann" };

  async function apiFetch(action, method = "GET", body = null) {
    const url = `${API_BASE}?action=${action}` + (method === "GET" && TOKEN ? `&t=${TOKEN}` : "");
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body) opts.body = JSON.stringify({ token: TOKEN, ...body });
    const res = await fetch(url, opts);
    return res.json();
  }

  async function loadData() {
    state.loading = true; render();
    const data = await apiFetch("fetchAll");
    if (data.error === "invalid_token" || !data.participant) { state.loading = false; state.participant = null; render(); return; }
    state.participant = data.participant; state.posts = data.posts;
    state.isHost = data.participant.role === "主催者";
    state.loading = false; render();
  }

  function openThread(id) { state.curItem = state.posts.find(p => p.id === id); state.screen = "thread"; render(); }
  function openCompose() { state.screen = "compose"; render(); }
  function back() { if (state.screen === "thread" || state.screen === "compose") { state.screen = "list"; render(); } }
  function setTab(t) { state.tab = t; render(); }
  function setComposeKind(k) { state.composeKind = k; render(); }
  function toggleHost() { state.isHost = !state.isHost; render(); }

  async function postItem() {
    const btn = document.getElementById("post-btn");
    const textEl = document.getElementById("compose-text");
    const notifyEl = document.getElementById("notify-check");
    const text = textEl?.value.trim();
    if (!text) { alert("本文を入力してください"); return; }
    if (btn) { btn.disabled = true; btn.textContent = "送信中…"; }
    const kind = state.participant?.role === "主催者" ? state.composeKind : "qa";
    const notify = notifyEl ? notifyEl.checked : false;
    const res = await apiFetch("addPost", "POST", { kind, text, notify });
    if (res.ok) { state.screen = "list"; await loadData(); }
    else { if (btn) { btn.disabled = false; btn.textContent = "投稿する"; } alert("投稿に失敗しました: " + (res.error || "")); }
  }

  async function addReply() {
    const input = document.getElementById("reply-input");
    const text = input?.value.trim();
    if (!text) return;
    input.value = "";
    const res = await apiFetch("addComment", "POST", { postId: state.curItem.id, text });
    if (res.ok) {
      state.curItem.replies.push({ user: state.participant.role === "主催者" ? "主催者" : state.participant.name, host: state.participant.role === "主催者", time: "たった今", text });
      render();
      setTimeout(() => { const b = document.querySelector(".thread-body"); if (b) b.scrollTop = b.scrollHeight; }, 50);
    }
  }

  async function inviteNew() {
    const btn = document.querySelector(".invite-btn");
    if (btn) { btn.disabled = true; btn.textContent = "送信中…"; }
    const res = await apiFetch("invite", "POST", {});
    if (btn) { btn.disabled = false; btn.textContent = "新規参加者を招待"; }
    if (res.ok) alert(`${res.sent}件の招待メールを送信しました。`);
    else alert("招待に失敗しました: " + (res.error || ""));
  }

  function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function escLink(s) { return esc(s).replace(/(https?:\/\/[^\s&]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }
  const COLORS = [{bg:"#f3f0ff",color:"#534AB7"},{bg:"#e8f5e9",color:"#388e3c"},{bg:"#fff3e0",color:"#f57c00"},{bg:"#fce4ec",color:"#c2185b"},{bg:"#e3f2fd",color:"#1565c0"},{bg:"#f9fbe7",color:"#827717"}];
  function colorOf(name) { let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff; return COLORS[h%COLORS.length]; }

  function render() {
    const app = document.getElementById("app");
    if (state.loading) { app.innerHTML='<div class="loading">読み込み中…</div>'; return; }
    if (!state.participant) { app.innerHTML='<div class="invalid">このリンクは無効です。<br>運営に問い合わせてください。</div>'; return; }
    if (state.screen==="compose") { renderCompose(app); return; }
    if (state.screen==="thread") { renderThread(app); return; }
    renderList(app);
  }

  function renderList(app) {
    const {tab,posts,isHost}=state;
    const filtered=tab==="mine"?posts.filter(p=>p.mine):tab==="ann"?posts.filter(p=>p.tp==="ann"):tab==="intro"?posts.filter(p=>p.tp==="intro"):posts;
    let html=`<div class="header"><h3>勉強会 質問サポート</h3><span class="count">${esc(state.participant.name)}</span></div>`;
    if(state.participant.role==="主催者"){
      html+=`<div class="mode-bar"><label><input type="checkbox" ${isHost?"checked":""} onchange="toggleHost()"> ${isHost?"主催者モード":"参加者モード"}</label>${isHost?'<button class="invite-btn" onclick="inviteNew()">新規参加者を招待</button>':""}</div>`;
    }
    html+=`<div class="tabs"><button class="tab ${tab==="mine"?"active":""}" onclick="setTab('mine')">自分の投稿</button><button class="tab ${tab==="ann"?"active":""}" onclick="setTab('ann')">お知らせ</button><button class="tab ${tab==="intro"?"active":""}" onclick="setTab('intro')">参加者の紹介</button><button class="tab ${tab==="all"?"active":""}" onclick="setTab('all')">すべて</button></div>`;
    html+='<div class="list">';
    if(filtered.length===0){
      html+=`<div class="empty">${tab==="mine"?"まだ投稿していません。<br>下のボタンから投稿してみましょう。":"まだ投稿がありません"}</div>`;
    } else {
      for(const p of filtered){
        const c=colorOf(p.user);
        const hasHostReply=p.tp==="qa"&&p.replies.some(r=>r.host);
        const statusHtml=p.tp==="qa"?(hasHostReply?'<span class="status answered">✓ 回答あり</span>':'<span class="status waiting">回答待ち</span>'):p.tp==="intro"?'<span class="status answered">参加者の紹介</span>':'<span class="status answered">お知らせ</span>';
        const extraClass=p.mine?"mine":(hasHostReply?"has-host-reply":"");
        const preview=p.text.length>55?p.text.slice(0,55)+"…":p.text;
        html+=`<div class="card ${extraClass}" onclick="openThread('${esc(p.id)}')">
          <div class="card-head"><div class="avatar" style="background:${c.bg};color:${c.color}">${esc(p.user.slice(0,1))}</div><span class="user-name">${esc(p.user)}</span>${p.tp==="ann"?'<span class="tag ann">お知らせ</span>"':""} ${p.tp==="intro"?'<span class="tag ann">紹介</span>':""} ${p.host&&p.tp!=="ann"&&p.tp!=="intro"?'<span class="tag host">主催者</span>':""}<span class="card-time">${esc(p.time)}</span></div>
          <div class="card-body">${esc(preview)}</div>
          <div class="card-foot">${statusHtml}<span class="reply-count">${p.replies.length}件</span></div>
        </div>`;
      }
    }
    html+="</div>";
    html+=`<button class="fab" onclick="openCompose()">+ ${isHost?"投稿":"質問する"}</button>`;
    app.innerHTML=html;
  }

  function renderThread(app) {
    const p=state.curItem; if(!p){back();return;}
    const c=colorOf(p.user);
    let html=`<div class="thread-head"><button class="back-btn" onclick="back()">‹</button><div class="thread-title">${p.tp==="ann"?"お知らせ":p.tp==="intro"?"参加者の紹介":"質問スレッド"}</div></div>`;
    html+='<div class="thread-body">';
    html+=`<div class="reply-box first"><div class="reply-head"><div class="avatar" style="background:${c.bg};color:${c.color}">${esc(p.user.slice(0,1))}</div><span class="reply-user">${esc(p.user)}</span>${p.host&&p.tp!=="ann"&&p.tp!=="intro"?'<span class="tag host">主催者</span>':""}<span class="reply-time">${esc(p.time)}</span></div><div class="reply-text">${escLink(p.text)}</div></div>`;
    for(const r of p.replies){
      html+=`<div class="reply-box ${r.host?"host-reply":""}"><div class="reply-head"><span class="reply-user">${esc(r.user)}</span>${r.host?'<span class="tag host">主催者</span>':""}<span class="reply-time">${esc(r.time)}</span></div><div class="reply-text">${escLink(r.text)}</div></div>`;
    }
    html+="</div>";
    html+=`<div class="composer"><input id="reply-input" placeholder="${p.tp==="qa"?"回答・コメントを入力":"コメントを入力"}" onkeydown="if(event.key==='Enter')addReply()"><button class="send-btn" onclick="addReply()">→</button></div>`;
    app.innerHTML=html;
    setTimeout(()=>{const b=document.querySelector(".thread-body");if(b)b.scrollTop=b.scrollHeight;const i=document.getElementById("reply-input");if(i)i.focus();},50);
  }

  function renderCompose(app) {
    const kind=state.composeKind||"ann";
    const isOrg=state.participant?.role==="主催者"&&state.isHost;
    const titleText=!isOrg?"新しい質問":kind==="intro"?"新しい参加者の紹介":"新しいお知らせ";
    const placeholder=!isOrg?"例: 減価償却の計算がわかりません…":kind==="intro"?"例: 山田さんは…という方で、今回から参加されます。":"例: 次回は5/27(火) 19:00から…";
    const hint=!isOrg?"家で詰まったところを気軽に質問してください。":kind==="intro"?"参加者の方々に紹介したい内容を書いてください。":"参加者に共有するお知らせを書いてください。";
    let html=`<div class="thread-head"><button class="back-btn" onclick="back()">‹</button><div class="thread-title">${titleText}</div></div>`;
    html+='<div class="compose-body">';
    if(isOrg){html+=`<div class="kind-tabs"><button class="kind-tab ${kind==="ann"?"active":""}" onclick="setComposeKind('ann')">お知らせ</button><button class="kind-tab ${kind==="intro"?"active":""}" onclick="setComposeKind('intro')">参加者の紹介</button></div>`;}
    html+=`<p>${hint}</p><textarea id="compose-text" placeholder="${esc(placeholder)}"></textarea>`;
    if(isOrg&&(kind==="ann"||kind==="intro")){html+='<label class="notify-label"><input type="checkbox" id="notify-check" checked> 参加者全員にメールで通知する</label>';}
    html+='<button id="post-btn" onclick="postItem()">投稿する</button></div>';
    app.innerHTML=html;
    setTimeout(()=>{const t=document.getElementById("compose-text");if(t)t.focus();},50);
  }

  loadData();
</script>
</body>
</html>
